<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Torsion - USV3M Trimaran</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e5ff;
            --primary-glow: rgba(0, 229, 255, 0.4);
            --danger: #ff003c;
            --danger-glow: rgba(255, 0, 60, 0.5);
            --safe: #00ff88;
            --bg-dark: #0f172a; /* Fond légèrement plus clair */
            --panel-bg: rgba(15, 23, 42, 0.95);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 15px;
            height: 100vh;
            box-sizing: border-box;
            background-color: #1e293b;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-main);
            user-select: none;
            display: flex;
            gap: 15px;
        }

        #model-bubble {
            flex: 1;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            background: #23272a; /* Gris studio */
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ui-bubble {
            width: 400px;
            flex-shrink: 0;
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 25px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            text-align: center;
        }

        .control-group {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 15px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        span.highlight {
            color: var(--primary);
            font-family: 'Roboto Mono', monospace;
            font-size: 1.3rem;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--primary);
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        .dashboard {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            flex-grow: 1;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .metric span.value {
            font-family: 'Roboto Mono', monospace;
            color: #fff;
        }

        .gauge-container {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            position: relative;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gauge-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .gauge-limit {
            position: absolute;
            top: 0; bottom: 0;
            width: 3px;
            background: #fff;
            box-shadow: 0 0 8px #fff;
            z-index: 2;
        }

        #status-badge {
            display: block;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
        }

        .status-safe {
            background: rgba(0, 255, 136, 0.05);
            color: var(--safe);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .status-danger {
            background: rgba(255, 0, 60, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            animation: pulseAlert 0.8s infinite alternate;
        }

        @keyframes pulseAlert {
            0% { box-shadow: 0 0 10px var(--danger-glow); }
            100% { box-shadow: 0 0 25px var(--danger-glow); }
        }

        .toggle-btn {
            width: 100%;
            padding: 15px;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
        }
        
        .toggle-btn.active { 
            background: var(--primary); 
            color: #000;
        }

        #vignette {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.4) 150%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="model-bubble">
        <div id="vignette"></div>
        <div id="canvas-container"></div>
    </div>

    <div id="ui-bubble">
        <h1>ANALYSE STRUCTURELLE</h1>
        
        <div class="control-group">
            <label>
                <span>Cisaillement (MPa)</span>
                <span id="load-val" class="highlight">0.00 MPa</span>
            </label>
            <input type="range" id="load-slider" min="0" max="2.0" value="0" step="0.01">
        </div>

        <div class="control-group">
            <label>
                <span>Nombre de Cloisons</span>
                <span id="bulkhead-val" class="highlight">2</span>
            </label>
            <input type="range" id="bulkhead-slider" min="2" max="8" value="2" step="1">
        </div>

        <div class="dashboard">
            <div class="metric">
                <span>Portée Libre (s)</span>
                <span class="value" id="spacing-out">1200 mm</span>
            </div>
            
            <div class="gauge-container">
                <div class="gauge-fill" id="gauge-fill"></div>
                <div class="gauge-limit" id="gauge-limit"></div>
            </div>

            <div class="metric">
                <span>Charge Appliquée</span>
                <span class="value" id="tau-app-out">0.00 MPa</span>
            </div>
            <div class="metric">
                <span style="color: var(--text-muted);">Limite Flambement</span>
                <span class="value" id="tau-cr-out">0.00 MPa</span>
            </div>
            
            <div id="status-badge" class="status-safe">ÉTAT OPTIMAL</div>
        </div>
        
        <button id="btn-xray" class="toggle-btn active">VUE TRANSPARENTE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x23272a); // Gris studio neutre
        scene.fog = new THREE.FogExp2(0x23272a, 0.01);

        const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(-45, 18, 30); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 10, 0); 

        // Grille de référence
        const gridHelper = new THREE.GridHelper(100, 20, 0x3f4448, 0x2c3136);
        gridHelper.position.y = -0.1;
        scene.add(gridHelper);

        // Eau
        const waterGeo = new THREE.PlaneGeometry(600, 600);
        const waterMat = new THREE.MeshPhysicalMaterial({ color: 0x1e3a5f, roughness: 0.2, metalness: 0.5, transparent: true, opacity: 0.6 });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(20, 50, 30);
        light.castShadow = true;
        scene.add(light);

        // Geometrie Coque
        const hullLen = 25.0; 
        const beamZ = 9.29; 
        const widthBot = 5.65;    
        const widthTop = 2.50; 
        const hullH = 4.0; 
        const elevation = 12;        
        
        const geometry = new THREE.BoxGeometry(widthBot, hullH, hullLen, 40, 20, 100);
        const posAttr = geometry.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            let y = posAttr.getY(i), x = posAttr.getX(i), z = posAttr.getZ(i);
            let absY = Math.abs(y) / (hullH / 2); 
            let scaleX = (widthBot - absY * (widthBot - widthTop)) / widthBot;
            if (Math.abs(z) > 9.5) {
                let t = (Math.abs(z) - 9.5) / (hullLen/2 - 9.5);
                scaleX *= (1 - t); y *= (1 - t);
            }
            posAttr.setXYZ(i, x * scaleX, y, z);
        }
        geometry.computeVertexNormals();

        const hullMat = new THREE.MeshPhysicalMaterial({ color: 0x334155, metalness: 0.4, roughness: 0.3, transparent: true, opacity: 0.65, side: THREE.DoubleSide });
        const wireMat = new THREE.LineBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.3 });
        const hullGroup = new THREE.Group();
        hullGroup.position.y = elevation; 
        const hullMesh = new THREE.Mesh(geometry, hullMat);
        hullMesh.add(new THREE.LineSegments(new THREE.WireframeGeometry(geometry), wireMat));
        hullGroup.add(hullMesh);
        scene.add(hullGroup);

        const originalPos = [];
        for (let i = 0; i < posAttr.count; i++) originalPos.push(new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i)));

        // STRUCTURE
        const beamGeo = new THREE.BoxGeometry(35, 1.0, 1.0); 
        beamGeo.translate(-14, 0, 0); 
        const beamMat = new THREE.MeshPhysicalMaterial({ color: 0x000000, roughness: 0.4, metalness: 0.8 });
        
        const beamF = new THREE.Mesh(beamGeo, beamMat);
        beamF.position.set(0, elevation, beamZ); beamF.rotation.x = Math.PI / 4;
        const beamR = new THREE.Mesh(beamGeo, beamMat);
        beamR.position.set(0, elevation, -beamZ); beamR.rotation.x = Math.PI / 4;
        scene.add(beamF, beamR);

        const strutZ = 7.5; 
        const strutGeo = new THREE.CylinderGeometry(0.6, 0.6, elevation + 8, 32);
        const strutMat = new THREE.MeshPhysicalMaterial({ color: 0xf8fafc, roughness: 0.1 });
        const strutF = new THREE.Mesh(strutGeo, strutMat);
        strutF.position.set(0, elevation + 2, strutZ);
        const strutR = new THREE.Mesh(strutGeo, strutMat);
        strutR.position.set(0, elevation + 2, -strutZ);
        scene.add(strutF, strutR);

        const shape = new THREE.Shape();
        const wM = widthBot/2, wT = widthTop/2, hH = hullH/2;
        shape.moveTo(-wT, hH); shape.lineTo(wT, hH); shape.lineTo(wM, 0); shape.lineTo(wT, -hH); shape.lineTo(-wT, -hH); shape.lineTo(-wM, 0);
        const bulkGeo = new THREE.ExtrudeGeometry(shape, { depth: 0.1, bevelEnabled: false });
        const bulkMat = new THREE.MeshPhysicalMaterial({ color: 0x78350f, roughness: 0.8 });

        function updateBulkheads(count) {
            const toRem = []; hullGroup.children.forEach(c => { if(c.isBulk) toRem.push(c); });
            toRem.forEach(c => hullGroup.remove(c));
            const span = 12.0; 
            const step = span / (count - 1);
            for (let i = 0; i < count; i++) {
                const bh = new THREE.Mesh(bulkGeo, bulkMat);
                bh.position.z = (-span / 2) + (i * step) - 0.05;
                bh.isBulk = true; hullGroup.add(bh);
            }
        }

        const loadS = document.getElementById('load-slider');
        const bulkS = document.getElementById('bulkhead-slider');
        const xrayB = document.getElementById('btn-xray');
        const gaugeF = document.getElementById('gauge-fill');
        const gaugeL = document.getElementById('gauge-limit');

        xrayB.onclick = () => {
            hullMat.transparent = !hullMat.transparent;
            hullMat.opacity = hullMat.transparent ? 0.65 : 1.0;
            xrayB.classList.toggle('active');
        };

        updateBulkheads(2);

        function update() {
            const tau = parseFloat(loadS.value);
            const N = parseInt(bulkS.value);
            
            document.getElementById('load-val').innerText = tau.toFixed(2) + ' MPa';
            document.getElementById('bulkhead-val').innerText = N;

            const span_mm = 1200; 
            const s = (span_mm / (N - 1)) - 10;
            document.getElementById('spacing-out').innerText = Math.round(s) + ' mm';

            const cr = 1.5 * Math.pow(450 / s, 2);
            document.getElementById('tau-app-out').innerText = tau.toFixed(2) + ' MPa';
            document.getElementById('tau-cr-out').innerText = cr.toFixed(2) + ' MPa';

            const fail = tau > cr;
            gaugeF.style.width = Math.min(100, (tau / 2.0) * 100) + '%';
            gaugeL.style.left = Math.min(100, (cr / 2.0) * 100) + '%';
            gaugeF.style.backgroundColor = fail ? 'var(--danger)' : 'var(--primary)';
            
            const badge = document.getElementById('status-badge');
            badge.innerText = fail ? 'ALERTE : FLAMBEMENT' : 'STRUCTURE OPTIMALE';
            badge.className = fail ? 'status-danger' : 'status-safe';

            const step_u = 12.0 / (N - 1);
            for (let i = 0; i < posAttr.count; i++) {
                const v = originalPos[i].clone();
                const sev = fail ? (tau - cr) : 0;
                const ang = (v.z / 12.5) * (tau / 1.22) * 0.12 * (1 + sev * 3);
                let nx = v.x * Math.cos(ang) - v.y * Math.sin(ang);
                let ny = v.x * Math.sin(ang) + v.y * Math.cos(ang);

                if (fail && Math.abs(v.z) < 6.0) {
                    const phase = Math.sin(((v.z + 6.0) / step_u) * Math.PI);
                    const disp = Math.sin(v.z * 4 + v.y * 6) * Math.pow(phase, 2) * sev * 1.8;
                    const len = Math.sqrt(nx*nx + ny*ny);
                    nx += (nx/len) * disp; ny += (ny/len) * disp;
                }
                posAttr.setXYZ(i, nx, ny, v.z);
            }
            posAttr.needsUpdate = true; geometry.computeVertexNormals();

            const rotFactor = (tau / 1.22) * 0.12 * (1 + (fail ? (tau-cr)*3 : 0));
            beamF.rotation.z = -((beamZ / 12.5) * rotFactor);
            beamR.rotation.z = ((beamZ / 12.5) * rotFactor);
        }

        loadS.oninput = update;
        bulkS.oninput = () => { updateBulkheads(parseInt(bulkS.value)); update(); };
        
        window.onresize = () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };

        update();
        (function anim() { requestAnimationFrame(anim); controls.update(); renderer.render(scene, camera); })();
    </script>
</body>
</html>
